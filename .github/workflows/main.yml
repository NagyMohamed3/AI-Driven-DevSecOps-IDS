name: DevSecOps & AI-IDS Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # 1. مرحلة فحص البايثون (جودة وأمان الكود)
 Python-Checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5 # حدثنا النسخة لـ v5 عشان تحل مشاكل الـ Node
        with:
          python-version: '3.10'
          cache: 'pip' # <--- ميزة الـ Caching عشان الـ Pipeline يبقى أسرع في المرات الجاية

      - name: Install Security Tools
        # ضفنا pip-audit عشان نفحص ثغرات المكتبات
        run: |
          python -m pip install --upgrade pip
          pip install flake8 bandit pip-audit 

      - name: Code Style Check (flake8)
        # بيفحص لو فيه غلطة تخلي الكود ما يشتغلش أصلاً
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Dependency Vulnerability Audit (pip-audit)
        # دي الخطوة "الاحترافية": بتفحص لو Flask أو أي مكتبة تانية فيها ثغرة أمنية معروفة
        continue-on-error: true
        run: pip-audit

      - name: Static Analysis Security Testing (Bandit)
        # بيفحص كودك إنت لو فيه ثغرات (زي اللي لقاها قبل كدة)
        continue-on-error: true
        run: bandit -r . -ll

  
  
    # 2. فحص ملفات Ansible
  Ansible-Checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Ansible
        run: pip install ansible

      # خطوة "السحر" اللي هتمسح أي UTF-16 أو رموز مخفية
      - name: Force Fix Encoding (Anti-Windows)
        run: |
          sudo apt-get install -y dos2unix
          find ansible -type f -exec dos2unix {} \;
          # مسح أي رموز مخفية في بداية الملفات
          find ansible -type f -exec sed -i '1s/^\xEF\xBB\xBF//' {} \;

      - name: Check Ansible Syntax
        run: |
          cd ansible
          ansible-playbook site.yml --syntax-check
          ansible-playbook block_attacker.yml --syntax-check
          ansible-playbook trap_attacker.yml --syntax-check
  # 3. فحص التسريبات والأمان (Gitleaks)
  Secrets-Scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
