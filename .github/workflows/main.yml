name: DevSecOps CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # 1. فحص ملفات البايثون (عندك webhook_listener و log_exporter)
  Python-Checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install Linting Tools
        run: pip install flake8 bandit
      - name: Code Style Check (flake8)
        run: flake8 ansible/ --count --select=E9,F63,F7,F82 --show-source --statistics
      - name: Security Scan (Bandit)
        run: bandit -r ansible/

  # 2. فحص ملفات Ansible (site.yml و block_attacker وغيرها)
    # 2. فحص ملفات Ansible
  Ansible-Checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Ansible
        run: pip install ansible
      - name: Check Ansible Syntax
        run: |
          # هندخل جوه فولدر ansible عشان يشوف الـ roles والـ cfg
          cd ansible
          ansible-playbook site.yml --syntax-check
          ansible-playbook block_attacker.yml --syntax-check
          ansible-playbook trap_attacker.yml --syntax-check
  # 3. فحص التسريبات والأمان (Gitleaks)
  Secrets-Scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}