---
# ==========================================================
# المرحلة 1: إعداد المراقبة والويب هوك (Control Plane)
# ==========================================================
- name: 1. Setup Local Monitoring & Webhook Listener
  hosts: localhost
  connection: local
  become: yes
  tasks:
    - name: Run Prometheus with Persistence
      docker_container:
        name: prometheus_local
        image: prom/prometheus
        state: started
        restart_policy: always
        ports: ["9090:9090"]
        volumes:
          - "{{ playbook_dir }}/prometheus.yml:/etc/prometheus/prometheus.yml"
          - "prom_data:/prometheus"

    - name: Run Grafana with Persistence
      docker_container:
        name: grafana_local
        image: grafana/grafana
        state: started
        user: "0:0"
        restart_policy: always
        ports: ["3000:3000"]
        volumes:
          - "grafana_data:/var/lib/grafana"

    - name: Start Webhook Listener
      shell: "nohup python3 /opt/webhook_listener.py > /var/log/webhook.log 2>&1 &"
      async: 10
      poll: 0

# ==========================================================
# المرحلة 2: إعداد الـ Honeypot (المصيدة)
# ==========================================================
- name: 2. Setup Honeypot Node & Containers
  hosts: honeypot
  become: yes
  tasks:
    - name: Run Cowrie (SSH Honeypot)
      docker_container:
        name: cowrie-container
        image: cowrie/cowrie
        state: started
        restart_policy: always
        ports: ["2222:2222"]

    - name: Run Dionaea (Multi-protocol Honeypot)
      docker_container:
        name: dionaea-all
        image: dinotools/dionaea
        state: started
        restart_policy: always
        ports: ["80:80", "21:21"]

# ==========================================================
# المرحلة 3: إعداد الـ Suricata وتشغيل الـ AI Log Exporter
# ==========================================================
- name: 3. Setup Suricata Node & AI Exporter
  hosts: suricata
  become: yes
  tasks:
    - name: Install Python Libraries for AI
      pip:
        name: [prometheus-client, scikit-learn, numpy, pandas]
        extra_args: "--break-system-packages"

    - name: Copy AI Components
      copy:
        src: "./{{ item }}"
        dest: "/opt/{{ item }}"
        mode: "0755"
      loop:
        - "model.pkl"
        - "scaler.pkl"
        - "log_exporter.py"

    - name: Start AI Log Exporter
      shell: "nohup python3 /opt/log_exporter.py > /var/log/ai_exporter.log 2>&1 &"
      async: 10
      poll: 0
  become: yes
  tasks:
    - name: Install AI Dependencies
      apt:
        name: [python3-pip, docker.io]
        state: present

    - name: Install Python Libraries for AI
      pip:
        name: [prometheus-client, scikit-learn, numpy, pandas]
        extra_args: "--break-system-packages"

    - name: Copy AI Components (Model, Scaler, Script)
      copy:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        mode: "{{ item.mode }}"
      loop:
        - { src: "./model.pkl", dest: "/opt/model.pkl", mode: "0644" }
        - { src: "./scaler.pkl", dest: "/opt/scaler.pkl", mode: "0644" }
        - { src: "./log_exporter.py", dest: "/opt/log_exporter.py", mode: "0755" }

    - name: Start AI Log Exporter (Background)
      shell: "nohup python3 /opt/log_exporter.py > /var/log/ai_exporter.log 2>&1 &"
      async: 10
      poll: 0
