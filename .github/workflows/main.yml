name: "DevSecOps Pipeline: AI-IDS & GNS3 Automation"

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # 1. فحص البايثون
  Python-Security-Audit:
    name: "Python Quality & Security Audit"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      - run: |
          pip install flake8 bandit pip-audit
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          bandit -r . -ll || true
          pip-audit || true

  # 2. فحص الأنسيبل
  Ansible-Validation:
    name: "Ansible Syntax Check"
    needs: Python-Security-Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          pip install ansible
          cd ansible
          ansible-playbook site.yml --syntax-check

  # 3. فحص التسريبات (Secrets)
  Secrets-Scanning:
    name: "Gitleaks Secrets Scan"
    needs: Ansible-Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # --- المرحلة الجديدة: التنبيه بنتيجة الفحص ---
  Notify-Audit-Result:
    name: "Notify Audit Result to Slack"
    needs: Secrets-Scanning # هتشتغل بمجرد ما الـ 3 فحوصات اللي فوق يخلصوا
    runs-on: ubuntu-latest
    if: always() # يبعت رسالة سواء الفحص نجح أو فشل
    steps:
      - name: Send Notification to Slack
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_CHANNEL: '#general'
          SLACK_USERNAME: 'Security Auditor'
          SLACK_TITLE: 'Security Audit: ${{ needs.Secrets-Scanning.result }}'
          SLACK_MESSAGE: |
             *Project:* Abo 3mera DevSecOps 🛡️
             *Status:* The Security Audit Phase has finished with status: `${{ needs.Secrets-Scanning.result }}`.
             *Next Step:* Starting Deployment to GNS3/EVE-NG... 🚀
          SLACK_COLOR: ${{ needs.Secrets-Scanning.result == 'success' && 'good' || 'danger' }}

  # 4. التنفيذ (Deployment) - هتشتغل في نفس الوقت أو بعد التنبيه
  Deploy-to-GNS3:
    name: "Deploy to GNS3 Environment"
    needs: Notify-Audit-Result # بتعتمد على التنبيه
    runs-on: self-hosted 
    if: success() # مش هتبدأ غير لو الفحص اللي فات "نجح" فعلاً
    steps:
      - uses: actions/checkout@v4
      - name: "Execute Ansible Playbook"
        run: |
          cd ansible
          ansible-playbook -i inventory.ini site.yml --extra-vars "ansible_ssh_pass=${{ secrets.SARA_PASSWORD }}"
